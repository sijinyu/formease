<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<title>FormEase Promo Tile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px;
    height: 280px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: white;
  }

  .container {
    text-align: center;
    padding: 0 40px;
  }

  .icon {
    width: 64px;
    height: 64px;
    background: rgba(255,255,255,0.2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 32px;
    font-weight: 800;
    border: 2px solid rgba(255,255,255,0.3);
  }

  h1 {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  p {
    font-size: 15px;
    opacity: 0.9;
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .tags {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .tag {
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">F</div>
    <h1>FormEase</h1>
    <p>One click to fill every form.<br>No account. No cloud. 100% Free.</p>
    <div class="tags">
      <span class="tag">Auto-Fill</span>
      <span class="tag">Keyboard Shortcuts</span>
      <span class="tag">Undo</span>
      <span class="tag">Privacy-First</span>
    </div>
  </div>
</body>
</html>
